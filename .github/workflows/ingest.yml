name: Refresh ingested listings

on:
  schedule:
    # Weekly on Mondays at 06:30 UTC. Adjust if you don't want noise this often.
    - cron: "30 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  ingest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run ingesters
        env:
          # `gh` and the GitHub REST API both pick this up via GITHUB_TOKEN
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run ingest

      - name: Verify build still passes
        run: npm run build

      - name: Open PR if data changed
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(ingest): refresh listings"
          title: "chore(ingest): refresh listings"
          body: |
            Automated refresh of `src/data/_ingested/*.json` from upstream sources.

            Generated by `.github/workflows/ingest.yml`.
          branch: chore/ingest-refresh
          delete-branch: true
          add-paths: |
            src/data/_ingested/*.json
